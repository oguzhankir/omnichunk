name: Rust Wheel Smoke

on:
  push:
    branches: [main]
    paths:
      - "rust/**"
      - "scripts/build_rust_extension.py"
      - "src/omnichunk/sizing/**"
      - ".github/workflows/rust-wheel-smoke.yml"
  pull_request:
    paths:
      - "rust/**"
      - "scripts/build_rust_extension.py"
      - "src/omnichunk/sizing/**"
      - ".github/workflows/rust-wheel-smoke.yml"

jobs:
  build-and-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install maturin

      - name: Build and install Rust extension
        run: python scripts/build_rust_extension.py --release

      - name: Smoke test rust backend
        run: python -c "from omnichunk import Chunker; from omnichunk.sizing import get_nws_backend_status; text='def a():\n    return 1\n'*200; chunks=Chunker(max_chunk_size=64,min_chunk_size=8,size_unit='chars',nws_backend='rust').chunk('x.py', text); status=get_nws_backend_status('rust'); assert status['active'] is True; assert chunks; assert ''.join(chunk.text for chunk in chunks) == text"
