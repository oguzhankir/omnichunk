name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Verify AI rule sync
        run: python scripts/check_ai_rules_sync.py

      - name: Verify benchmark harness
        run: python scripts/check_benchmarks.py

      - name: Run tests
        run: pytest -q

      - name: Run Ruff
        run: ruff check src tests

      - name: Run mypy
        run: mypy src/omnichunk
